version: "3.8"

services:
  db:
    image: mariadb:10.6
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: frappe
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      retries: 10

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_cache:/data

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_queue:/data

  redis-socketio:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_socketio:/data

  frappe:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"   # web
      - "9000:9000"   # socketio
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_CACHE=redis-cache:6379
      - REDIS_QUEUE=redis-queue:6379
      - REDIS_SOCKETIO=redis-socketio:6379
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
      redis-socketio:
        condition: service_started
    volumes:
      - frappe_sites:/home/frappe/frappe-bench/sites

volumes:
  db_data:
  redis_cache:
  redis_queue:
  redis_socketio:
  frappe_sites:
